name: Run Ultra Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  run-ultra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install aiohttp telebot pymongo pytz psutil

      - name: Run Binary + Python
        run: |
          chmod +x ultra
          ./ultra &
          python3 ultra.py
